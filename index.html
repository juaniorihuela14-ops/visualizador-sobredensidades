
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visualizador de sobredensidades</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --bg: #f5f6f8;
    --panel: #ffffff;
    --text: #1f2933;
    --muted: #697386;
    --border: #d8dee9;
    --accent: #1f77b4;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
}

header {
    padding: 18px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
}

h1 {
    margin: 0 0 12px 0;
    font-size: 22px;
}

.controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}

.control-block {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}

select, button {
    padding: 8px 10px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: white;
}

button {
    cursor: pointer;
}

button.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}

main {
    padding: 20px 24px 40px 24px;
}

.status {
    margin-bottom: 14px;
    color: var(--muted);
}

.summary {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 18px;
}

.summary h2 {
    margin: 0 0 10px 0;
    font-size: 18px;
}

.summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px 16px;
}

.summary-item {
    font-size: 14px;
}

.summary-key {
    color: var(--muted);
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 18px;
}

.card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
}

.card h3 {
    margin: 0 0 4px 0;
    font-size: 16px;
}

.card p {
    margin: 0 0 10px 0;
    font-size: 13px;
    color: var(--muted);
}

.card img {
    width: 100%;
    display: block;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: zoom-in;
    background: white;
}

.modal {
    display: none;
    position: fixed;
    z-index: 100;
    inset: 0;
    background: rgba(0, 0, 0, 0.86);
    align-items: center;
    justify-content: center;
    padding: 24px;
}

.modal.open {
    display: flex;
}

.modal-content {
    max-width: 96vw;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.modal-title {
    color: white;
    font-size: 15px;
}

.modal img {
    max-width: 96vw;
    max-height: 82vh;
    border-radius: 8px;
    background: white;
}

.modal-controls {
    display: flex;
    gap: 10px;
}

.modal-controls button {
    background: white;
}
</style>
</head>

<body>

<header>
    <h1>Visualizador de sobredensidades</h1>

    <div class="controls">

        <label>
            Modo:
            <select id="modeSelect">
                <option value="group">Seleccionar grupo</option>
                <option value="plot">Seleccionar gráfico</option>
            </select>
        </label>

        <div id="groupControls" class="control-block">
            <button id="prevGroupBtn">Previous group</button>

            <label>
                Grupo:
                <select id="groupSelect"></select>
            </label>

            <button id="nextGroupBtn">Next group</button>
        </div>

        <div id="plotControls" class="control-block">
            <button id="prevGraphBtn">Previous graph</button>

            <label>
                Gráfico:
                <select id="graphSelect"></select>
            </label>

            <button id="nextGraphBtn">Next graph</button>
        </div>

        <button class="primary" id="reloadBtn">Recargar desde Supabase</button>
    </div>
</header>

<main>
    <div id="status" class="status">Cargando datos...</div>
    <section id="summary" class="summary"></section>
    <section id="plotGrid" class="grid"></section>
</main>

<div id="modal" class="modal">
    <div class="modal-content">
        <div id="modalTitle" class="modal-title"></div>
        <img id="modalImage" src="">
        <div class="modal-controls">
            <button id="prevImageBtn">Anterior</button>
            <button id="nextImageBtn">Siguiente</button>
            <button id="closeModalBtn">Cerrar</button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://paffbamebsezllxfzkqa.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_kJT6KjTYMxIvyNK8GiNuYg_bKItPN2s";
const PROJECT_ID = "sobredensidades_v1";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let groups = [];
let plots = [];
let graphSpecs = [];

let mode = "group";
let selectedGroupIndex = 0;
let selectedGraphIndex = 0;

let modalItems = [];
let modalIndex = 0;

const modeSelect = document.getElementById("modeSelect");
const groupSelect = document.getElementById("groupSelect");
const graphSelect = document.getElementById("graphSelect");

const groupControls = document.getElementById("groupControls");
const plotControls = document.getElementById("plotControls");

const plotGrid = document.getElementById("plotGrid");
const summaryBox = document.getElementById("summary");
const statusBox = document.getElementById("status");

const modal = document.getElementById("modal");
const modalImage = document.getElementById("modalImage");
const modalTitle = document.getElementById("modalTitle");

function numericUidSort(a, b) {
    const an = Number(a.uid);
    const bn = Number(b.uid);

    if (Number.isFinite(an) && Number.isFinite(bn)) {
        return an - bn;
    }

    return String(a.uid).localeCompare(String(b.uid));
}

function selectedGroup() {
    return groups[selectedGroupIndex] || null;
}

function selectedGraph() {
    return graphSpecs[selectedGraphIndex] || null;
}

async function loadData() {
    statusBox.textContent = "Cargando datos desde Supabase...";

    const groupsResponse = await client
        .from("visualizer_groups")
        .select("uid, summary")
        .eq("project_id", PROJECT_ID);

    if (groupsResponse.error) {
        console.error(groupsResponse.error);
        statusBox.textContent = "Error cargando grupos desde Supabase.";
        return;
    }

    const plotsResponse = await client
        .from("visualizer_plots")
        .select("uid, graph_key, graph_label, graph_description, sort_order, public_url")
        .eq("project_id", PROJECT_ID)
        .order("sort_order", { ascending: true });

    if (plotsResponse.error) {
        console.error(plotsResponse.error);
        statusBox.textContent = "Error cargando gráficos desde Supabase.";
        return;
    }

    groups = groupsResponse.data.sort(numericUidSort);
    plots = plotsResponse.data;

    const graphMap = new Map();

    for (const plot of plots) {
        if (!graphMap.has(plot.graph_key)) {
            graphMap.set(plot.graph_key, {
                key: plot.graph_key,
                label: plot.graph_label || plot.graph_key,
                description: plot.graph_description || "",
                sort_order: plot.sort_order || 0,
            });
        }
    }

    graphSpecs = Array.from(graphMap.values())
        .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));

    selectedGroupIndex = Math.min(selectedGroupIndex, Math.max(groups.length - 1, 0));
    selectedGraphIndex = Math.min(selectedGraphIndex, Math.max(graphSpecs.length - 1, 0));

    initControls();
    render();

    statusBox.textContent = `Datos cargados: ${groups.length} grupos, ${plots.length} gráficos.`;
}

function initControls() {
    groupSelect.innerHTML = "";

    for (let i = 0; i < groups.length; i++) {
        const opt = document.createElement("option");
        opt.value = String(i);
        opt.textContent = groups[i].uid;
        groupSelect.appendChild(opt);
    }

    graphSelect.innerHTML = "";

    for (let i = 0; i < graphSpecs.length; i++) {
        const opt = document.createElement("option");
        opt.value = String(i);
        opt.textContent = graphSpecs[i].label;
        graphSelect.appendChild(opt);
    }

    modeSelect.value = mode;
    groupSelect.value = String(selectedGroupIndex);
    graphSelect.value = String(selectedGraphIndex);
}

function renderSummaryForGroup(group) {
    if (!group) {
        summaryBox.innerHTML = "";
        return;
    }

    const summary = group.summary || {};
    const entries = Object.entries(summary);

    let html = `<h2>Resumen del grupo ${group.uid}</h2>`;

    if (entries.length === 0) {
        html += `<div class="summary-item">Sin resumen disponible.</div>`;
    } else {
        html += `<div class="summary-grid">`;

        for (const [key, value] of entries) {
            html += `
                <div class="summary-item">
                    <span class="summary-key">${key}:</span>
                    <span>${value}</span>
                </div>
            `;
        }

        html += `</div>`;
    }

    summaryBox.innerHTML = html;
}

function renderSummaryForGraph(graph) {
    if (!graph) {
        summaryBox.innerHTML = "";
        return;
    }

    summaryBox.innerHTML = `
        <h2>Gráfico: ${graph.label}</h2>
        <div class="summary-item">
            <span class="summary-key">Descripción:</span>
            <span>${graph.description || "Sin descripción disponible."}</span>
        </div>
        <div class="summary-item">
            <span class="summary-key">Modo:</span>
            <span>Mostrando este gráfico para todos los grupos disponibles.</span>
        </div>
    `;
}

function plotsForSelectedGroup() {
    const group = selectedGroup();

    if (!group) return [];

    return plots
        .filter(p => String(p.uid) === String(group.uid))
        .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
}

function plotsForSelectedGraph() {
    const graph = selectedGraph();

    if (!graph) return [];

    const groupOrder = new Map();

    for (let i = 0; i < groups.length; i++) {
        groupOrder.set(String(groups[i].uid), i);
    }

    return plots
        .filter(p => p.graph_key === graph.key)
        .sort((a, b) => {
            const ai = groupOrder.get(String(a.uid)) ?? 999999;
            const bi = groupOrder.get(String(b.uid)) ?? 999999;
            return ai - bi;
        });
}

function renderPlotsForGroup() {
    const groupPlots = plotsForSelectedGroup();

    plotGrid.innerHTML = "";
    modalItems = [];

    for (let i = 0; i < groupPlots.length; i++) {
        const plot = groupPlots[i];

        const title = plot.graph_label || plot.graph_key;
        const desc = plot.graph_description || "";

        const card = document.createElement("article");
        card.className = "card";

        card.innerHTML = `
            <h3>${title}</h3>
            <p>${desc}</p>
            <img src="${plot.public_url}" alt="${title}">
        `;

        const img = card.querySelector("img");

        img.addEventListener("click", () => {
            openModal(i);
        });

        plotGrid.appendChild(card);

        modalItems.push({
            title: `${title} — Grupo ${plot.uid}`,
            url: plot.public_url,
        });
    }
}

function renderPlotsForGraph() {
    const graphPlots = plotsForSelectedGraph();

    plotGrid.innerHTML = "";
    modalItems = [];

    for (let i = 0; i < graphPlots.length; i++) {
        const plot = graphPlots[i];

        const title = `Grupo ${plot.uid}`;
        const desc = plot.graph_label || plot.graph_key;

        const card = document.createElement("article");
        card.className = "card";

        card.innerHTML = `
            <h3>${title}</h3>
            <p>${desc}</p>
            <img src="${plot.public_url}" alt="${title}">
        `;

        const img = card.querySelector("img");

        img.addEventListener("click", () => {
            openModal(i);
        });

        plotGrid.appendChild(card);

        modalItems.push({
            title: `${plot.graph_label || plot.graph_key} — Grupo ${plot.uid}`,
            url: plot.public_url,
        });
    }
}

function render() {
    modeSelect.value = mode;
    groupSelect.value = String(selectedGroupIndex);
    graphSelect.value = String(selectedGraphIndex);

    if (mode === "group") {
        groupControls.style.display = "flex";
        plotControls.style.display = "none";

        renderSummaryForGroup(selectedGroup());
        renderPlotsForGroup();
    }

    if (mode === "plot") {
        groupControls.style.display = "none";
        plotControls.style.display = "flex";

        renderSummaryForGraph(selectedGraph());
        renderPlotsForGraph();
    }
}

function previousGroup() {
    if (groups.length === 0) return;

    selectedGroupIndex = (selectedGroupIndex - 1 + groups.length) % groups.length;
    render();
}

function nextGroup() {
    if (groups.length === 0) return;

    selectedGroupIndex = (selectedGroupIndex + 1) % groups.length;
    render();
}

function previousGraph() {
    if (graphSpecs.length === 0) return;

    selectedGraphIndex = (selectedGraphIndex - 1 + graphSpecs.length) % graphSpecs.length;
    render();
}

function nextGraph() {
    if (graphSpecs.length === 0) return;

    selectedGraphIndex = (selectedGraphIndex + 1) % graphSpecs.length;
    render();
}

function openModal(index) {
    if (modalItems.length === 0) return;

    modalIndex = index;
    updateModal();
    modal.classList.add("open");
}

function updateModal() {
    const item = modalItems[modalIndex];

    if (!item) return;

    modalImage.src = item.url;
    modalTitle.textContent = item.title;
}

function closeModal() {
    modal.classList.remove("open");
    modalImage.src = "";
}

function previousImage() {
    if (modalItems.length === 0) return;

    modalIndex = (modalIndex - 1 + modalItems.length) % modalItems.length;
    updateModal();
}

function nextImage() {
    if (modalItems.length === 0) return;

    modalIndex = (modalIndex + 1) % modalItems.length;
    updateModal();
}

modeSelect.addEventListener("change", () => {
    mode = modeSelect.value;
    render();
});

groupSelect.addEventListener("change", () => {
    selectedGroupIndex = Number(groupSelect.value);
    render();
});

graphSelect.addEventListener("change", () => {
    selectedGraphIndex = Number(graphSelect.value);
    render();
});

document.getElementById("prevGroupBtn").addEventListener("click", previousGroup);
document.getElementById("nextGroupBtn").addEventListener("click", nextGroup);

document.getElementById("prevGraphBtn").addEventListener("click", previousGraph);
document.getElementById("nextGraphBtn").addEventListener("click", nextGraph);

document.getElementById("reloadBtn").addEventListener("click", loadData);

document.getElementById("prevImageBtn").addEventListener("click", previousImage);
document.getElementById("nextImageBtn").addEventListener("click", nextImage);
document.getElementById("closeModalBtn").addEventListener("click", closeModal);

modal.addEventListener("click", event => {
    if (event.target === modal) {
        closeModal();
    }
});

document.addEventListener("keydown", event => {
    if (modal.classList.contains("open")) {
        if (event.key === "Escape") closeModal();
        if (event.key === "ArrowLeft") previousImage();
        if (event.key === "ArrowRight") nextImage();
        return;
    }

    if (mode === "group") {
        if (event.key === "ArrowLeft") previousGroup();
        if (event.key === "ArrowRight") nextGroup();
    }

    if (mode === "plot") {
        if (event.key === "ArrowLeft") previousGraph();
        if (event.key === "ArrowRight") nextGraph();
    }
});

loadData();
</script>

</body>
</html>
